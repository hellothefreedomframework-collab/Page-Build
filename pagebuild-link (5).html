<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PageBuild</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo {
      width: 100%;
      max-width: 280px;
      margin: 0 auto 4px;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .tagline {
      font-size: 13px;
      color: #999;
      margin-bottom: 24px;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 17px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn:active { opacity: 0.8; }
    .btn-call {
      background: #1A3260;
      color: white;
    }
    .btn-email {
      background: white;
      color: #1A3260;
      border: 2px solid #1A3260;
    }
    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .footer {
      margin-top: 18px;
      font-size: 11px;
      color: #ccc;
    }
  </style>
</head>
